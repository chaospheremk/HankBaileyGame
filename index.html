<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Zoomies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #3a2a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    max-width: 900px;
    width: 100%;
    image-rendering: auto;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const LOGICAL_W = 800;
const LOGICAL_H = 300;
const GROUND_Y = 240;
const GRAVITY = 1800;
const COLORS = {
  parchment: '#F5EDD6',
  orange: '#E8824A',
  orangeLight: '#F0A870',
  orangeDark: '#C06830',
  orangeStripe: '#D07038',
  black: '#2C2C3A',
  blackLight: '#4A4A5E',
  blackFur: '#3A3A4E',
  floor: '#C4A882',
  floorDark: '#A08060',
  mint: '#7EC8A4',
  mintDark: '#5AA880',
  text: '#4A3728',
  textLight: '#6B5740',
  red: '#E85A5A',
  white: '#FFF8EE',
  whiteTrue: '#FFFFFF',
  pink: '#FFAAAA',
  wallpaper1: '#EDE3C8',
  shadow: 'rgba(0,0,0,0.12)',
};

const CAT_CONFIG = {
  hank: {
    width: 65, height: 48,
    jumpVel: -620,
    canDoubleJump: false,
    duckHeight: 24,
    name: 'Hank',
    desc: 'Chonky  |  Single Jump  |  Auto-collects Treats',
  },
  bailey: {
    width: 50, height: 40,
    jumpVel: -520,
    canDoubleJump: true,
    duckHeight: 20,
    name: 'Bailey',
    desc: 'Speedy  |  Double Jump  |  Sometimes Stares at Walls',
  },
};

const OBSTACLE_TYPES = {
  roomba: { width: 50, height: 20, speed: 1.0 },
  sprayBottle: { width: 22, height: 35, speed: 0.8 },
  vetCarrier: { width: 55, height: 42, speed: 0.6 },
  broom: { width: 15, height: 45, speed: 0.85 },
  plant: { width: 35, height: 30, speed: 1.1 },
};

const COLLECTIBLE_TYPES = {
  treat: { width: 20, height: 20, points: 10, color: '#D4944A' },
  yarn: { width: 22, height: 22, points: 25, color: '#CC5588' },
  sunspot: { width: 30, height: 16, points: 0, color: '#FFE87A' },
  pawPrint: { width: 20, height: 20, points: 0, color: COLORS.mint },
};

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
canvas.width = LOGICAL_W * dpr;
canvas.height = LOGICAL_H * dpr;
ctx.scale(dpr, dpr);

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function aabbOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function randomRange(min, max) { return min + Math.random() * (max - min); }

// ============================================================
// CAT DRAWING — DETAILED & CUTE
// ============================================================
function drawCatDetailed(cat, time) {
  const isHank = cat.type === 'hank';
  const cfg = CAT_CONFIG[cat.type];
  const w = cfg.width;
  const h = cat.ducking ? cfg.duckHeight : cfg.height;

  ctx.save();
  ctx.translate(cat.x + w / 2, cat.y + h);

  if (cat.stunTimer > 0) {
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(time * 20);
  }
  if (cat.invincible) {
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(time * 15);
    ctx.shadowColor = COLORS.mint;
    ctx.shadowBlur = 15;
  }

  const flip = cat.facingLeft ? -1 : 1;
  ctx.scale(flip, 1);

  // Ground shadow
  ctx.fillStyle = COLORS.shadow;
  ctx.beginPath();
  ctx.ellipse(0, 2, w * 0.38, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  const bodyBounce = cat.onGround ? Math.sin(time * (isHank ? 8 : 14)) * 1.5 : 0;
  const breathe = Math.sin(time * 3) * 0.5;

  if (cat.ducking) {
    _drawCatDucking(isHank, w, h, time);
  } else {
    _drawCatStanding(cat, isHank, w, h, time, bodyBounce, breathe);
  }

  ctx.restore();
}

function _drawCatDucking(isHank, w, h, time) {
  // Flattened body — loaf shape
  const bodyColor = isHank ? COLORS.orange : COLORS.black;
  const bellyColor = isHank ? COLORS.orangeLight : COLORS.blackFur;

  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 5;
  ctx.shadowOffsetY = 2;

  // Main loaf body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, -h / 2, w * 0.48, h * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Belly tuck
  ctx.fillStyle = bellyColor;
  ctx.beginPath();
  ctx.ellipse(0, -h / 2 + 3, w * 0.35, h * 0.3, 0, 0.2, Math.PI - 0.2);
  ctx.fill();

  // Head peeks up
  const headR = isHank ? 13 : 11;
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(w * 0.28, -h + 2, headR, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (peeking)
  _drawEyes(w * 0.28, -h + 2, isHank ? 8 : 7, headR * 0.5, time, false, false, 0);

  // Ears (flattened)
  _drawEars(w * 0.28, -h + 2 - headR, isHank, headR * 0.65, true);

  // Tail curled around
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = isHank ? 5 : 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-w * 0.4, -h / 2);
  ctx.bezierCurveTo(-w * 0.5, -h * 0.8, -w * 0.3, -h * 1.1,
    -w * 0.15 + Math.sin(time * 2) * 4, -h * 0.9);
  ctx.stroke();

  // Hank stripes on loaf
  if (isHank) {
    _drawTabbyStripes(0, -h / 2, w * 0.4, h * 0.5, 0.2);
  }

  // Paws tucked under (tiny tips visible)
  ctx.fillStyle = isHank ? COLORS.orangeDark : COLORS.blackLight;
  ctx.beginPath();
  ctx.ellipse(w * 0.15, 0, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-w * 0.15, 0, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
}

function _drawCatStanding(cat, isHank, w, h, time, bodyBounce, breathe) {
  const bodyColor = isHank ? COLORS.orange : COLORS.black;
  const bellyColor = isHank ? COLORS.orangeLight : COLORS.blackFur;
  const legPhase = cat.onGround ? time * (isHank ? 8 : 14) : 0;

  // ---- TAIL (behind body) ----
  const tailSpeed = isHank ? 3 : 8;
  const tailAmp = isHank ? 10 : 15;
  const tailWag = Math.sin(time * tailSpeed) * tailAmp;
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = isHank ? 6 : 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-w * 0.38, -h * 0.4);
  ctx.bezierCurveTo(
    -w * 0.5, -h * 0.6 + tailWag * 0.3,
    -w * 0.55 + tailWag * 0.15, -h * 0.85,
    -w * 0.4 + tailWag * 0.4, -h * 1.15
  );
  ctx.stroke();
  // Tail tip highlight
  if (isHank) {
    ctx.strokeStyle = COLORS.orangeLight;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-w * 0.45 + tailWag * 0.3, -h * 1.0);
    ctx.lineTo(-w * 0.4 + tailWag * 0.4, -h * 1.15);
    ctx.stroke();
  }

  // ---- BACK LEGS ----
  const legColor = isHank ? COLORS.orangeDark : '#222230';
  const pawColor = isHank ? COLORS.orangeLight : '#3A3A4E';
  const backLegSwing1 = cat.onGround ? Math.sin(legPhase) * 4 : -2;
  const backLegSwing2 = cat.onGround ? Math.sin(legPhase + Math.PI) * 4 : -2;
  _drawLeg(-w * 0.22, 0, backLegSwing1, legColor, pawColor, isHank ? 9 : 7, isHank);
  _drawLeg(-w * 0.05, 0, backLegSwing2, legColor, pawColor, isHank ? 9 : 7, isHank);

  // ---- BODY ----
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;

  // Main body — elongated ellipse
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  const bodyW = w * 0.46;
  const bodyH = h * 0.45 + breathe;
  ctx.ellipse(0, -h * 0.42 + bodyBounce, bodyW, bodyH, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Belly (lighter underside)
  ctx.fillStyle = bellyColor;
  ctx.beginPath();
  ctx.ellipse(2, -h * 0.32 + bodyBounce, bodyW * 0.65, bodyH * 0.55, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Tabby stripes for Hank
  if (isHank) {
    _drawTabbyStripes(0, -h * 0.42 + bodyBounce, bodyW, bodyH, 0.25);
  }

  // Fur texture — soft streaks
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = isHank ? '#FFF' : '#888';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    const fx = -bodyW * 0.5 + i * bodyW * 0.25;
    ctx.moveTo(fx, -h * 0.6 + bodyBounce);
    ctx.bezierCurveTo(fx + 3, -h * 0.5 + bodyBounce, fx - 2, -h * 0.35 + bodyBounce, fx + 1, -h * 0.25 + bodyBounce);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // ---- FRONT LEGS ----
  const frontLegSwing1 = cat.onGround ? Math.sin(legPhase + Math.PI * 0.5) * 4 : 3;
  const frontLegSwing2 = cat.onGround ? Math.sin(legPhase + Math.PI * 1.5) * 4 : 3;
  _drawLeg(w * 0.1, 0, frontLegSwing1, legColor, pawColor, isHank ? 9 : 7, isHank);
  _drawLeg(w * 0.25, 0, frontLegSwing2, legColor, pawColor, isHank ? 9 : 7, isHank);

  // ---- CHEST FLOOF ----
  if (isHank) {
    ctx.fillStyle = COLORS.orangeLight;
    ctx.beginPath();
    ctx.ellipse(w * 0.2, -h * 0.45 + bodyBounce, 8, 10, 0.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- HEAD ----
  const headX = w * 0.22;
  const headY = -h * 0.72 + bodyBounce;
  const headR = isHank ? 16 : 14;

  // Neck
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(headX - 4, headY + headR * 0.7, headR * 0.7, headR * 0.5, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Head circle
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(headX, headY, headR, 0, Math.PI * 2);
  ctx.fill();

  // Cheek fluff (makes face rounder/cuter)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(headX - headR * 0.6, headY + 3, headR * 0.45, headR * 0.4, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(headX + headR * 0.6, headY + 3, headR * 0.45, headR * 0.4, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Face detail — lighter muzzle area
  ctx.fillStyle = isHank ? '#F5C090' : '#444458';
  ctx.beginPath();
  ctx.ellipse(headX, headY + headR * 0.25, headR * 0.5, headR * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Forehead markings (Hank: tabby M, Bailey: slight shine)
  if (isHank) {
    ctx.strokeStyle = COLORS.orangeStripe;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.4;
    // Tabby M on forehead
    ctx.beginPath();
    ctx.moveTo(headX - 8, headY - 4);
    ctx.lineTo(headX - 4, headY - 9);
    ctx.lineTo(headX, headY - 5);
    ctx.lineTo(headX + 4, headY - 9);
    ctx.lineTo(headX + 8, headY - 4);
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    // Subtle sheen on dark fur
    ctx.fillStyle = 'rgba(120,120,160,0.15)';
    ctx.beginPath();
    ctx.ellipse(headX - 3, headY - 5, 5, 4, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- EARS ----
  _drawEars(headX, headY - headR, isHank, headR, false);

  // ---- EYES ----
  const eyeOffsetX = (cat.wallStaring) ? 5 :
    (cat.type === 'bailey' && Math.sin(time * 1.3) > 0.8) ? 2 : 0;
  _drawEyes(headX, headY, isHank ? 9 : 8, headR * 0.45, time, cat.stunTimer > 0, cat.wallStaring, eyeOffsetX);

  // ---- NOSE ----
  const noseY = headY + headR * 0.3;
  ctx.fillStyle = isHank ? '#E08070' : '#555566';
  ctx.beginPath();
  ctx.moveTo(headX, noseY - 2);
  ctx.bezierCurveTo(headX - 4, noseY + 2, headX + 4, noseY + 2, headX, noseY - 2);
  ctx.fill();
  // Nose highlight
  ctx.fillStyle = isHank ? '#F0A090' : '#666678';
  ctx.beginPath();
  ctx.arc(headX - 1, noseY - 1, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // ---- MOUTH ----
  ctx.strokeStyle = isHank ? COLORS.orangeDark : '#444';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(headX, noseY + 1);
  ctx.lineTo(headX - 3, noseY + 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(headX, noseY + 1);
  ctx.lineTo(headX + 3, noseY + 5);
  ctx.stroke();
  // Smile curve
  ctx.beginPath();
  ctx.arc(headX - 3, noseY + 3, 3, 0, 0.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(headX + 3, noseY + 3, 3, Math.PI - 0.8, Math.PI);
  ctx.stroke();

  // ---- WHISKERS ----
  ctx.strokeStyle = isHank ? 'rgba(240,200,180,0.6)' : 'rgba(180,180,200,0.5)';
  ctx.lineWidth = 0.8;
  for (let side = -1; side <= 1; side += 2) {
    for (let j = 0; j < 3; j++) {
      const wy = noseY + 1 + (j - 1) * 3;
      const wLen = 18 + j * 2;
      const wDroop = (j - 1) * 2;
      ctx.beginPath();
      ctx.moveTo(headX + side * 6, wy);
      ctx.quadraticCurveTo(
        headX + side * (wLen * 0.6), wy + wDroop - 1,
        headX + side * wLen, wy + wDroop
      );
      ctx.stroke();
    }
  }

  // ---- WALL STARE BUBBLE ----
  if (cat.wallStareShowBubble) {
    const bubbleText = cat.wallStaring ? '  . . .' : 'wall?!';
    const bubbleW = cat.wallStaring ? 40 : 46;
    ctx.fillStyle = COLORS.white;
    roundRect(headX + 10, headY - headR - 24, bubbleW, 20, 8);
    ctx.fill();
    ctx.strokeStyle = COLORS.textLight;
    ctx.lineWidth = 1;
    roundRect(headX + 10, headY - headR - 24, bubbleW, 20, 8);
    ctx.stroke();
    // Little triangle pointer
    ctx.fillStyle = COLORS.white;
    ctx.beginPath();
    ctx.moveTo(headX + 16, headY - headR - 4);
    ctx.lineTo(headX + 22, headY - headR - 4);
    ctx.lineTo(headX + 15, headY - headR + 2);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.font = '13px "Patrick Hand", cursive';
    ctx.textAlign = 'center';
    ctx.fillText(bubbleText, headX + 10 + bubbleW / 2, headY - headR - 10);
  }
}

function _drawLeg(x, baseY, swing, legColor, pawColor, legW, isChonky) {
  const legH = 12;
  ctx.fillStyle = legColor;
  roundRect(x - legW / 2, baseY - legH + swing, legW, legH, 3);
  ctx.fill();
  // Paw
  ctx.fillStyle = pawColor;
  ctx.beginPath();
  ctx.ellipse(x, baseY + swing, legW * 0.6, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toe beans (tiny detail)
  if (isChonky) {
    ctx.fillStyle = COLORS.pink;
    ctx.globalAlpha = 0.3;
    for (let t = -1; t <= 1; t++) {
      ctx.beginPath();
      ctx.arc(x + t * 2.5, baseY + swing - 1, 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function _drawEars(headX, earBaseY, isHank, headR, flat) {
  const earW = isHank ? 10 : 8;
  const earH = flat ? 6 : (isHank ? 13 : 16);
  const earSpread = headR * 0.6;
  const bodyColor = isHank ? COLORS.orange : COLORS.black;
  const innerColor = isHank ? '#F0A878' : '#5A5A70';

  for (let side = -1; side <= 1; side += 2) {
    const ex = headX + side * earSpread;
    // Outer ear
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(ex - earW * 0.5, earBaseY + 3);
    ctx.lineTo(ex + side * 2, earBaseY - earH);
    ctx.lineTo(ex + earW * 0.5, earBaseY + 3);
    ctx.closePath();
    ctx.fill();
    // Inner ear
    ctx.fillStyle = innerColor;
    ctx.beginPath();
    ctx.moveTo(ex - earW * 0.3, earBaseY + 2);
    ctx.lineTo(ex + side * 1.5, earBaseY - earH + 4);
    ctx.lineTo(ex + earW * 0.3, earBaseY + 2);
    ctx.closePath();
    ctx.fill();
  }
}

function _drawEyes(headX, headY, spacing, eyeR, time, stunned, wallStaring, offsetX) {
  const eyeY = headY - eyeR * 0.1;
  const blinkPhase = Math.sin(time * 2.5);
  let eyeH = eyeR;
  if (blinkPhase > 0.93) eyeH = eyeR * 0.15;

  for (let side = -1; side <= 1; side += 2) {
    const ex = headX + side * spacing * 0.5 + offsetX;

    // Eye white
    ctx.fillStyle = stunned ? '#FFAAAA' : COLORS.whiteTrue;
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, eyeR, eyeH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eye outline
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, eyeR, eyeH, 0, 0, Math.PI * 2);
    ctx.stroke();

    if (eyeH > eyeR * 0.3) {
      // Iris
      const irisR = eyeR * 0.6;
      ctx.fillStyle = stunned ? '#CC3333' : (wallStaring ? '#556633' : '#334422');
      ctx.beginPath();
      ctx.arc(ex + 0.5 + offsetX * 0.3, eyeY + 0.5, irisR, 0, Math.PI * 2);
      ctx.fill();

      // Pupil (cute large pupil)
      const pupilR = wallStaring ? irisR * 0.9 : irisR * 0.6;
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(ex + 0.5 + offsetX * 0.3, eyeY + 0.5, pupilR, 0, Math.PI * 2);
      ctx.fill();

      // Eye shine (two highlights for that cute anime look)
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(ex + irisR * 0.3, eyeY - irisR * 0.3, irisR * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(ex - irisR * 0.2, eyeY + irisR * 0.3, irisR * 0.15, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function _drawTabbyStripes(cx, cy, bw, bh, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = COLORS.orangeStripe;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  for (let i = -2; i <= 2; i++) {
    const sx = cx + i * bw * 0.2;
    ctx.beginPath();
    ctx.moveTo(sx, cy - bh * 0.6);
    ctx.bezierCurveTo(sx + 2, cy - bh * 0.3, sx - 1, cy, sx + 1, cy + bh * 0.3);
    ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
// OBSTACLE DRAWING
// ============================================================
function drawRoomba(x, y) {
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.ellipse(x + 25, y + 14, 25, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.ellipse(x + 25, y + 12, 22, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#70E070';
  ctx.beginPath();
  ctx.arc(x + 25, y + 10, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + 25, y + 14, 24, Math.PI * 0.9, Math.PI * 0.1, true);
  ctx.stroke();
}

function drawSprayBottle(x, y, time) {
  ctx.fillStyle = '#5588CC';
  roundRect(x + 3, y + 10, 16, 25, 4);
  ctx.fill();
  ctx.fillStyle = '#DDDDDD';
  roundRect(x + 5, y, 12, 14, 3);
  ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x + 1, y + 8, 6, 6);
  if (Math.sin(time * 10) > 0) {
    ctx.fillStyle = 'rgba(100, 180, 255, 0.6)';
    ctx.beginPath();
    ctx.arc(x - 3, y + 5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x - 7, y + 2, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawVetCarrier(x, y) {
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#8B6B4A';
  roundRect(x, y, 65, 50, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#6B4B2A';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(x + 10 + i * 10, y + 8);
    ctx.lineTo(x + 10 + i * 10, y + 42);
    ctx.stroke();
  }
  ctx.strokeStyle = '#5B3B1A';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x + 32.5, y - 2, 12, Math.PI, 0);
  ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(x + 25, y + 25, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 40, y + 25, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(x + 25, y + 25, 1.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 40, y + 25, 1.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
}

function drawBroom(x, y, time) {
  const sweepAngle = Math.sin(time * 4) * 0.2;
  ctx.save();
  ctx.translate(x + 7, y);
  ctx.rotate(sweepAngle);
  ctx.fillStyle = '#9B7B4A';
  ctx.fillRect(-3, 0, 6, 50);
  ctx.fillStyle = '#C4A040';
  for (let i = -6; i <= 6; i += 2) ctx.fillRect(i - 1, 48, 2, 14);
  ctx.restore();
}

function drawPlant(x, y) {
  ctx.fillStyle = '#B06030';
  ctx.beginPath();
  ctx.moveTo(x + 5, y + 10); ctx.lineTo(x + 30, y + 10);
  ctx.lineTo(x + 27, y + 30); ctx.lineTo(x + 8, y + 30);
  ctx.fill();
  ctx.fillStyle = '#604020';
  roundRect(x + 6, y + 10, 23, 6, 2); ctx.fill();
  ctx.fillStyle = '#6B9B50';
  ctx.beginPath(); ctx.ellipse(x + 17, y + 4, 12, 8, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5A8A40';
  ctx.beginPath(); ctx.ellipse(x + 20, y + 2, 8, 6, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#705030';
  ctx.beginPath(); ctx.arc(x + 2, y + 28, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 33, y + 26, 2, 0, Math.PI * 2); ctx.fill();
}

function drawObstacle(obs, time) {
  switch (obs.type) {
    case 'roomba': drawRoomba(obs.x, obs.y); break;
    case 'sprayBottle': drawSprayBottle(obs.x, obs.y, time); break;
    case 'vetCarrier': drawVetCarrier(obs.x, obs.y); break;
    case 'broom': drawBroom(obs.x, obs.y, time); break;
    case 'plant': drawPlant(obs.x, obs.y); break;
  }
}

// ============================================================
// COLLECTIBLE DRAWING
// ============================================================
function drawTreat(x, y, time) {
  const bob = Math.sin(time * 4) * 3;
  ctx.fillStyle = '#D4944A';
  ctx.beginPath(); ctx.ellipse(x + 10, y + 10 + bob, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#B07030';
  ctx.beginPath(); ctx.ellipse(x + 10, y + 10 + bob, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,220,0.7)';
  ctx.beginPath(); ctx.arc(x + 14, y + 6 + bob, 2, 0, Math.PI * 2); ctx.fill();
}

function drawYarn(x, y, time) {
  const bob = Math.sin(time * 3 + 1) * 3;
  ctx.fillStyle = '#CC5588';
  ctx.beginPath(); ctx.arc(x + 11, y + 11 + bob, 10, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#E070A0'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x + 11, y + 11 + bob, 7, 0.5, 3); ctx.stroke();
  ctx.beginPath(); ctx.arc(x + 11, y + 11 + bob, 4, 1, 4); ctx.stroke();
  ctx.strokeStyle = '#CC5588';
  ctx.beginPath();
  ctx.moveTo(x + 20, y + 14 + bob);
  ctx.bezierCurveTo(x + 25, y + 20 + bob, x + 22, y + 25 + bob, x + 28, y + 22 + bob);
  ctx.stroke();
}

function drawSunspot(x, y, time) {
  const pulse = 1 + Math.sin(time * 3) * 0.1;
  ctx.save();
  ctx.globalAlpha = 0.5 + Math.sin(time * 2) * 0.15;
  ctx.fillStyle = '#FFE87A'; ctx.shadowColor = '#FFE87A'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.ellipse(x + 15, y + 8, 15 * pulse, 8 * pulse, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.3; ctx.fillStyle = '#FFF8CC';
  ctx.beginPath(); ctx.ellipse(x + 15, y + 8, 10 * pulse, 5 * pulse, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawPawPrint(x, y, time) {
  const bob = Math.sin(time * 3 + 2) * 2;
  ctx.fillStyle = COLORS.mint;
  ctx.beginPath(); ctx.ellipse(x + 10, y + 13 + bob, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
  [[-4, -5], [0, -7], [4, -5]].forEach(([tx, ty]) => {
    ctx.beginPath(); ctx.arc(x + 10 + tx, y + 13 + ty + bob, 3, 0, Math.PI * 2); ctx.fill();
  });
  ctx.save(); ctx.globalAlpha = 0.3; ctx.shadowColor = COLORS.mint; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(x + 10, y + 10 + bob, 12, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawCollectible(col, time) {
  switch (col.type) {
    case 'treat': drawTreat(col.x, col.y, time); break;
    case 'yarn': drawYarn(col.x, col.y, time); break;
    case 'sunspot': drawSunspot(col.x, col.y, time); break;
    case 'pawPrint': drawPawPrint(col.x, col.y, time); break;
  }
}

// ============================================================
// AUDIO ENGINE — DEBOUNCED & SCHEDULED
// ============================================================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = false;
    this.musicPlaying = false;
    this.musicNodes = [];
    this._lastSoundTime = {};
    this._minInterval = 0.1; // Min 100ms between same sound type
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.ctx.destination);
    this.sfxGain = this.ctx.createGain();
    this.sfxGain.gain.value = 1.0;
    this.sfxGain.connect(this.masterGain);
  }

  toggleMute() {
    this.muted = !this.muted;
    if (this.masterGain) {
      this.masterGain.gain.value = this.muted ? 0 : 0.3;
    }
  }

  _canPlay(soundId) {
    if (!this.ctx) return false;
    const now = this.ctx.currentTime;
    const last = this._lastSoundTime[soundId] || 0;
    if (now - last < this._minInterval) return false;
    this._lastSoundTime[soundId] = now;
    return true;
  }

  _scheduleTone(freq, startTime, duration, type = 'square', vol = 0.15) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.01);
  }

  playJump(catType) {
    if (!this._canPlay('jump')) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(catType === 'hank' ? 220 : 330, now);
    osc.frequency.exponentialRampToValueAtTime(catType === 'hank' ? 440 : 660, now + 0.12);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(now);
    osc.stop(now + 0.16);
  }

  playDuck() {
    if (!this._canPlay('duck')) return;
    const now = this.ctx.currentTime;
    this._scheduleTone(400, now, 0.08, 'square', 0.08);
    this._scheduleTone(250, now + 0.03, 0.06, 'square', 0.06);
  }

  playCollect() {
    if (!this._canPlay('collect')) return;
    const now = this.ctx.currentTime;
    [523, 659, 784].forEach((f, i) => {
      this._scheduleTone(f, now + i * 0.05, 0.12, 'square', 0.1);
    });
  }

  playYarnCollect() {
    if (!this._canPlay('yarn')) return;
    const now = this.ctx.currentTime;
    [600, 700, 800, 700, 800, 900].forEach((f, i) => {
      this._scheduleTone(f, now + i * 0.03, 0.06, 'triangle', 0.08);
    });
  }

  playHit() {
    if (!this._canPlay('hit')) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(now);
    osc.stop(now + 0.31);
  }

  playWallStare() {
    if (!this._canPlay('wallstare')) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine'; osc2.type = 'sine';
    osc.frequency.value = 280; osc2.frequency.value = 283;
    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc.connect(gain); osc2.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(now); osc2.start(now);
    osc.stop(now + 0.81); osc2.stop(now + 0.81);
  }

  playGameOver() {
    if (!this._canPlay('gameover')) return;
    const now = this.ctx.currentTime;
    [400, 350, 300, 200].forEach((f, i) => {
      this._scheduleTone(f, now + i * 0.2, 0.3, 'triangle', 0.12);
    });
  }

  playHighScore() {
    if (!this._canPlay('highscore')) return;
    const now = this.ctx.currentTime;
    [523, 659, 784, 1047].forEach((f, i) => {
      this._scheduleTone(f, now + i * 0.12, 0.2, 'square', 0.1);
    });
  }

  playExtraLife() {
    if (!this._canPlay('extralife')) return;
    const now = this.ctx.currentTime;
    [440, 554, 659, 880].forEach((f, i) => {
      this._scheduleTone(f, now + i * 0.08, 0.15, 'triangle', 0.1);
    });
  }

  startMusic() {
    if (!this.ctx || this.musicPlaying) return;
    this.musicPlaying = true;
    this._scheduleNextLoop();
  }

  stopMusic() {
    this.musicPlaying = false;
    if (this._musicTimeout) clearTimeout(this._musicTimeout);
    this.musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    this.musicNodes = [];
  }

  _scheduleNextLoop() {
    if (!this.musicPlaying || !this.ctx) return;
    const bpm = 140;
    const beatLen = 60 / bpm;
    const now = this.ctx.currentTime;

    const melody = [
      523, 0, 659, 0, 784, 0, 659, 0,
      523, 0, 784, 0, 659, 0, 523, 0,
      587, 0, 740, 0, 880, 0, 740, 0,
      523, 0, 659, 0, 784, 0, 0, 0,
    ];
    const bass = [
      131, 131, 165, 165, 196, 196, 165, 165,
      131, 131, 196, 196, 165, 165, 131, 131,
      147, 147, 185, 185, 220, 220, 185, 185,
      131, 131, 165, 165, 196, 196, 131, 131,
    ];

    const halfBeat = beatLen * 0.5;

    melody.forEach((freq, i) => {
      if (freq === 0) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t = now + i * halfBeat;
      gain.gain.setValueAtTime(0.04, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + halfBeat * 0.9);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(t);
      osc.stop(t + halfBeat);
      this.musicNodes.push(osc);
    });

    bass.forEach((freq, i) => {
      if (freq === 0) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * halfBeat;
      gain.gain.setValueAtTime(0.05, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + halfBeat * 0.9);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(t);
      osc.stop(t + halfBeat);
      this.musicNodes.push(osc);
    });

    const loopDuration = melody.length * halfBeat;
    this._musicTimeout = setTimeout(() => {
      this.musicNodes = [];
      this._scheduleNextLoop();
    }, loopDuration * 1000 - 50); // Slight overlap to prevent gap
  }
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
class Particle {
  constructor(x, y, color, vx, vy, life = 0.5, size = 3) {
    this.x = x; this.y = y; this.color = color;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life; this.size = size;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vy += 300 * dt; this.life -= dt;
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let particles = [];

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color,
      randomRange(-120, 120), randomRange(-200, -50), randomRange(0.3, 0.7), randomRange(2, 5)));
  }
}

function spawnCollectParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    particles.push(new Particle(x, y, color, Math.cos(angle) * 80, Math.sin(angle) * 80, 0.4, 3));
  }
}

// ============================================================
// SCROLLING BACKGROUND
// ============================================================
class ScrollingBackground {
  constructor() { this.offset1 = 0; this.offset2 = 0; this.offset3 = 0; }

  update(dt, speed) {
    this.offset1 = (this.offset1 + speed * 0.3 * dt) % LOGICAL_W;
    this.offset2 = (this.offset2 + speed * 0.6 * dt) % LOGICAL_W;
    this.offset3 = (this.offset3 + speed * dt) % LOGICAL_W;
  }

  draw(time) {
    ctx.fillStyle = COLORS.parchment;
    ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
    this._drawWallLayer();
    this._drawFurnitureLayer();
    this._drawFloorLayer();
  }

  _drawWallLayer() {
    const off = this.offset1;
    ctx.fillStyle = COLORS.wallpaper1;
    for (let i = -1; i < 30; i++) ctx.fillRect(i * 60 - (off % 60), 0, 30, GROUND_Y);
    ctx.fillStyle = 'rgba(200, 180, 140, 0.15)';
    for (let i = -1; i < 20; i++) {
      const x = i * 120 - (off % 120);
      ctx.strokeStyle = 'rgba(139, 107, 74, 0.2)'; ctx.lineWidth = 2;
      roundRect(x + 20, 30, 60, 45, 3); ctx.stroke();
      ctx.fillStyle = 'rgba(200, 180, 140, 0.15)';
      roundRect(x + 24, 34, 52, 37, 1); ctx.fill();
    }
    ctx.fillStyle = '#B09070'; ctx.fillRect(0, GROUND_Y - 8, LOGICAL_W, 8);
    ctx.fillStyle = '#A08060'; ctx.fillRect(0, GROUND_Y - 3, LOGICAL_W, 3);
  }

  _drawFurnitureLayer() {
    const off = this.offset2;
    ctx.fillStyle = 'rgba(120, 90, 60, 0.12)';
    for (let i = -1; i < 5; i++) {
      const bx = i * 300 - (off % 300);
      roundRect(bx + 10, GROUND_Y - 70, 80, 65, 8); ctx.fill();
      roundRect(bx + 10, GROUND_Y - 85, 80, 20, 6); ctx.fill();
      roundRect(bx + 130, GROUND_Y - 100, 40, 95, 3); ctx.fill();
      ctx.strokeStyle = 'rgba(120, 90, 60, 0.08)'; ctx.lineWidth = 1;
      for (let s = 0; s < 4; s++) {
        ctx.beginPath();
        ctx.moveTo(bx + 132, GROUND_Y - 80 + s * 22);
        ctx.lineTo(bx + 168, GROUND_Y - 80 + s * 22);
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(100, 140, 70, 0.12)';
      ctx.beginPath(); ctx.arc(bx + 220, GROUND_Y - 60, 20, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(120, 90, 60, 0.12)';
      ctx.fillRect(bx + 215, GROUND_Y - 40, 10, 35);
    }
  }

  _drawFloorLayer() {
    const off = this.offset3;
    ctx.fillStyle = COLORS.floor;
    ctx.fillRect(0, GROUND_Y, LOGICAL_W, LOGICAL_H - GROUND_Y);
    ctx.strokeStyle = COLORS.floorDark; ctx.lineWidth = 1;
    for (let i = -1; i < 25; i++) {
      ctx.beginPath(); ctx.moveTo(i * 60 - (off % 60), GROUND_Y);
      ctx.lineTo(i * 60 - (off % 60), LOGICAL_H); ctx.stroke();
    }
    const rugX = 200 - (off % 400);
    for (let r = -1; r < 3; r++) {
      const rx = rugX + r * 400;
      ctx.fillStyle = 'rgba(192, 112, 80, 0.25)'; roundRect(rx, GROUND_Y + 8, 160, 40, 4); ctx.fill();
      ctx.fillStyle = 'rgba(168, 88, 56, 0.15)'; roundRect(rx + 10, GROUND_Y + 14, 140, 28, 3); ctx.fill();
    }
    ctx.fillStyle = 'rgba(200, 100, 100, 0.15)';
    for (let i = -1; i < 8; i++) {
      ctx.beginPath(); ctx.arc(i * 150 + 50 - (off % 150), GROUND_Y + 35, 4, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// ============================================================
// INPUT HANDLER
// ============================================================
class InputHandler {
  constructor() {
    this.keys = {};
    this.jumpPressed = false;
    this.duckPressed = false;
    this.anyKeyPressed = false;
    this.muteClicked = false;
    this.leftPressed = false;
    this.rightPressed = false;
    this.touchStartX = 0;
    this.touchStartY = 0;

    window.addEventListener('keydown', e => {
      if (['Space', 'ArrowUp', 'ArrowDown', 'KeyS', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
        e.preventDefault();
      }
      if (!this.keys[e.code]) {
        this.keys[e.code] = true;
        this.anyKeyPressed = true;
        if (e.code === 'Space' || e.code === 'ArrowUp') this.jumpPressed = true;
        if (e.code === 'ArrowDown' || e.code === 'KeyS') this.duckPressed = true;
        if (e.code === 'ArrowLeft') this.leftPressed = true;
        if (e.code === 'ArrowRight') this.rightPressed = true;
      }
    });

    window.addEventListener('keyup', e => {
      this.keys[e.code] = false;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') this.duckPressed = false;
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.touches[0];
      this.touchStartX = touch.clientX;
      this.touchStartY = touch.clientY;
      this.anyKeyPressed = true;
      const rect = canvas.getBoundingClientRect();
      const scaleX = LOGICAL_W / rect.width;
      const scaleY = LOGICAL_H / rect.height;
      const cx = (touch.clientX - rect.left) * scaleX;
      const cy = (touch.clientY - rect.top) * scaleY;
      if (cx > LOGICAL_W - 45 && cy < 35) { this.muteClicked = true; return; }
      this.jumpPressed = true;
    }, { passive: false });

    canvas.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      if (e.changedTouches.length === 0) return;
      const touch = e.changedTouches[0];
      const dy = touch.clientY - this.touchStartY;
      if (Math.abs(dy) > 30 && dy > 0) {
        this.duckPressed = true;
        setTimeout(() => { this.duckPressed = false; }, 300);
      }
    }, { passive: false });

    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = LOGICAL_W / rect.width;
      const scaleY = LOGICAL_H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      if (cx > LOGICAL_W - 45 && cy < 35) this.muteClicked = true;
    });
  }

  consumeJump() { const v = this.jumpPressed; this.jumpPressed = false; return v; }
  consumeLeft() { const v = this.leftPressed; this.leftPressed = false; return v; }
  consumeRight() { const v = this.rightPressed; this.rightPressed = false; return v; }
  consumeAnyKey() { const v = this.anyKeyPressed; this.anyKeyPressed = false; return v; }
  consumeMuteClick() { const v = this.muteClicked; this.muteClicked = false; return v; }
  isDucking() { return this.duckPressed; }
}

    this.invincibleTimer = 0;
    this.wallStaring = false;
    this.wallStareTimer = 0;
    this.wallStareCooldown = 8;
    this.wallStareShowBubble = false;
  }

  reset() {
    const cfg = CAT_CONFIG[this.type];
    this.y = GROUND_Y - cfg.height;
    this.vy = 0;
    this.onGround = true;
    this.ducking = false;
    this.jumps = 0;
    this.stunTimer = 0;
    this.invincible = false;
    this.invincibleTimer = 0;
    this.wallStaring = false;
    this.wallStareTimer = 0;
    this.wallStareCooldown = 8;
    this.wallStareShowBubble = false;
  }

  getHitbox() {
    const cfg = CAT_CONFIG[this.type];
    const h = this.ducking ? cfg.duckHeight : cfg.height;
    const y = this.ducking ? GROUND_Y - h : this.y;
    return { x: this.x + 8, y: y + 5, w: cfg.width - 16, h: h - 10 };
  }

  jump() {
    if (this.stunTimer > 0 || this.wallStaring) return;
    const cfg = CAT_CONFIG[this.type];
    if (this.jumps < this.maxJumps) {
      this.vy = cfg.jumpVel;
      if (this.jumps === 1 && this.type === 'bailey') {
        this.vy = cfg.jumpVel * 0.85;
      }
      this.jumps++;
      this.onGround = false;
      this.ducking = false;
      audio.playJump(this.type);
    }
  }

  duck(active) {
    if (this.stunTimer > 0 || this.wallStaring) return;
    if (this.onGround) {
      this.ducking = active;
      if (active) audio.playDuck();
    }
  }

  update(dt) {
    const cfg = CAT_CONFIG[this.type];

    if (this.stunTimer > 0) this.stunTimer -= dt;

    if (this.invincibleTimer > 0) {
      this.invincibleTimer -= dt;
      if (this.invincibleTimer <= 0) this.invincible = false;
    }

    // Bailey wall stare — funny pause, not punishing (invulnerable during it)
    if (this.type === 'bailey') {
      this.wallStareCooldown -= dt;
      if (!this.wallStaring && !this.wallStareShowBubble && this.wallStareCooldown <= 0 && this.onGround) {
        if (Math.random() < 0.002) {
          this.wallStareShowBubble = true;
          this.wallStareTimer = 0.7; // Warning: "wall?!" bubble
          audio.playWallStare();
        }
      }
      if (this.wallStareShowBubble && !this.wallStaring) {
        this.wallStareTimer -= dt;
        if (this.wallStareTimer <= 0) {
          this.wallStaring = true;
          this.invincible = true; // Can't be hurt while being weird
          this.wallStareTimer = 0.5; // Short freeze
        }
      }
      if (this.wallStaring) {
        this.wallStareTimer -= dt;
        if (this.wallStareTimer <= 0) {
          this.wallStaring = false;
          this.wallStareShowBubble = false;
          this.invincible = false;
          this.wallStareCooldown = 12 + Math.random() * 8;
        }
      }
    }

    // Gravity
    if (!this.onGround) {
      const gravMult = this.type === 'hank' ? 0.85 : 1.0;
      this.vy += GRAVITY * gravMult * dt;
      this.y += this.vy * dt;
      const groundLevel = GROUND_Y - (this.ducking ? cfg.duckHeight : cfg.height);
      if (this.y >= groundLevel) {
        this.y = groundLevel;
        this.vy = 0;
        this.onGround = true;
        this.jumps = 0;
      }
    }

    if (this.ducking && this.onGround) {
      this.height = cfg.duckHeight;
      this.y = GROUND_Y - cfg.duckHeight;
    } else if (!this.ducking) {
      this.height = cfg.height;
      if (this.onGround) this.y = GROUND_Y - cfg.height;
    }
  }
}

class Obstacle {
  constructor(type) {
    const cfg = OBSTACLE_TYPES[type];
    this.type = type;
    this.width = cfg.width;
    this.height = cfg.height;
    this.speedMult = cfg.speed;
    this.x = LOGICAL_W + 20;
    if (type === 'sprayBottle') {
      this.y = GROUND_Y - 100 - Math.random() * 60;
      this.vy = 80; this.arc = true;
    } else {
      this.y = GROUND_Y - cfg.height;
      this.vy = 0; this.arc = false;
    }
    if (type === 'broom') this.sweepPhase = 0;
  }

  getHitbox() {
    return { x: this.x + 3, y: this.y + 3, w: this.width - 6, h: this.height - 6 };
  }

  update(dt, speed) {
    this.x -= speed * this.speedMult * dt;
    if (this.arc) {
      this.vy += 200 * dt;
      this.y += this.vy * dt;
      if (this.y > GROUND_Y - this.height) { this.y = GROUND_Y - this.height; this.vy = 0; }
    }
    if (this.type === 'broom') {
      this.sweepPhase += dt * 2;
      this.y = Math.sin(this.sweepPhase) > 0.5 ? GROUND_Y - this.height - 20 : GROUND_Y - this.height;
    }
  }
}

class Collectible {
  constructor(type) {
    const cfg = COLLECTIBLE_TYPES[type];
    this.type = type;
    this.width = cfg.width;
    this.height = cfg.height;
    this.points = cfg.points;
    this.x = LOGICAL_W + 20;
    this.y = GROUND_Y - cfg.height - Math.random() * 40 - 10;
    this.collected = false;
  }
  getHitbox() { return { x: this.x, y: this.y, w: this.width, h: this.height }; }
  update(dt, speed) { this.x -= speed * dt; }
}

// ============================================================
// GAME INSTANCE
// ============================================================
const bg = new ScrollingBackground();
const input = new InputHandler();
let playerCat = null;
let obstacles = [];
let collectibles = [];
let obstacleTimer = 0;
let collectibleTimer = 0;
let lastTime = 0;

function resetGame() {
  gameState.score = 0;
  gameState.lives = 3;
  gameState.gameSpeed = 200;
  gameState.time = 0;
  gameState.difficulty = 0;
  gameState.screenShake = 0;
  gameState.newHighScore = false;
  gameState.speedBoostTimer = 0;
  playerCat = new Cat(gameState.selectedCat);
  obstacles = [];
  collectibles = [];
  particles = [];
  obstacleTimer = 2;
  collectibleTimer = 3;
}

function spawnObstacle() {
  const types = Object.keys(OBSTACLE_TYPES);
  const weights = [3, 2, 1, 2, 2];
  let total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let chosen = types[0];
  for (let i = 0; i < types.length; i++) {
    r -= weights[i];
    if (r <= 0) { chosen = types[i]; break; }
  }
  obstacles.push(new Obstacle(chosen));
}

function spawnCollectible() {
  const r = Math.random();
  let type;
  if (r < 0.5) type = 'treat';
  else if (r < 0.8) type = 'yarn';
  else if (r < 0.95) type = 'sunspot';
  else type = 'pawPrint';
  collectibles.push(new Collectible(type));
}

function handleCollisions() {
  if (playerCat.stunTimer > 0 || playerCat.invincible) return;
  const catBox = playerCat.getHitbox();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (aabbOverlap(catBox, obstacles[i].getHitbox())) {
      gameState.lives--;
      playerCat.stunTimer = 1.0;
      gameState.screenShake = 0.3;
      audio.playHit();
      spawnParticles(playerCat.x + playerCat.width / 2, playerCat.y + playerCat.height / 2,
        playerCat.type === 'hank' ? COLORS.orange : COLORS.black, 12);
      obstacles.splice(i, 1);

      if (gameState.lives <= 0) {
        gameState.screen = 'gameover';
        audio.stopMusic();
        if (gameState.score > gameState.highScore) {
          gameState.highScore = gameState.score;
          gameState.newHighScore = true;
          localStorage.setItem('zoomies_high', gameState.highScore.toString());
          audio.playHighScore();
        } else {
          audio.playGameOver();
        }
      }
      return;
    }
  }
}

function handleCollectibles() {
  const catBox = playerCat.getHitbox();
  const hankBox = playerCat.type === 'hank'
    ? { x: catBox.x - 15, y: catBox.y - 15, w: catBox.w + 30, h: catBox.h + 30 }
    : catBox;

  for (let i = collectibles.length - 1; i >= 0; i--) {
    const col = collectibles[i];
    if (col.collected) continue;
    const checkBox = (col.type === 'treat' && playerCat.type === 'hank') ? hankBox : catBox;

    if (aabbOverlap(checkBox, col.getHitbox())) {
      col.collected = true;
      spawnCollectParticles(col.x + col.width / 2, col.y + col.height / 2, COLLECTIBLE_TYPES[col.type].color);

      switch (col.type) {
        case 'treat': gameState.score += 10; audio.playCollect(); break;
        case 'yarn': gameState.score += 25; gameState.speedBoostTimer = 2; audio.playYarnCollect(); break;
        case 'sunspot': playerCat.invincible = true; playerCat.invincibleTimer = 3; audio.playCollect(); break;
        case 'pawPrint':
          if (gameState.lives < 3) { gameState.lives++; audio.playExtraLife(); }
          else { gameState.score += 50; audio.playCollect(); }
          break;
      }
      collectibles.splice(i, 1);
    }
  }
}

// ============================================================
// SCREEN RENDERERS
// ============================================================
function drawTitleScreen(time) {
  bg.draw(time);
  ctx.fillStyle = 'rgba(245, 237, 214, 0.6)';
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

  ctx.textAlign = 'center';
  ctx.fillStyle = COLORS.text;
  ctx.font = '900 48px Nunito, sans-serif';
  ctx.fillText('THE ZOOMIES', LOGICAL_W / 2, 80 + Math.sin(time * 2) * 3);

  ctx.font = '20px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.textLight;
  ctx.fillText('3am. No reason. Full speed.', LOGICAL_W / 2, 110);

  // Title cats
  const titleHank = { type: 'hank', x: LOGICAL_W / 2 - 130, y: GROUND_Y - 48,
    onGround: true, ducking: false, stunTimer: 0, facingLeft: false,
    invincible: false, wallStaring: false, wallStareShowBubble: false };
  const titleBailey = { type: 'bailey', x: LOGICAL_W / 2 + 60, y: GROUND_Y - 40,
    onGround: true, ducking: false, stunTimer: 0, facingLeft: true,
    invincible: false, wallStaring: false, wallStareShowBubble: false };
  drawCatDetailed(titleHank, time);
  drawCatDetailed(titleBailey, time);

  const pulse = 0.5 + Math.sin(time * 3) * 0.5;
  ctx.globalAlpha = pulse;
  ctx.font = '22px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.text;
  ctx.fillText('[ Press Space to Start ]', LOGICAL_W / 2, GROUND_Y + 35);
  ctx.globalAlpha = 1;

  if (gameState.highScore > 0) {
    ctx.font = '16px "Patrick Hand", cursive';
    ctx.fillStyle = COLORS.textLight;
    ctx.fillText('High Score: ' + gameState.highScore, LOGICAL_W / 2, GROUND_Y + 55);
  }
  drawMuteButton();
}

function drawSelectScreen(time) {
  bg.draw(time);
  ctx.fillStyle = 'rgba(245, 237, 214, 0.7)';
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

  ctx.textAlign = 'center';
  ctx.fillStyle = COLORS.text;
  ctx.font = '900 32px Nunito, sans-serif';
  ctx.fillText('CHOOSE YOUR CAT', LOGICAL_W / 2, 40);

  const cursor = gameState.selectCursor;

  // Two selection boxes
  const boxW = 300;
  const boxH = 180;
  const gap = 30;
  const startX = (LOGICAL_W - boxW * 2 - gap) / 2;

  for (let i = 0; i < 2; i++) {
    const bx = startX + i * (boxW + gap);
    const by = 55;
    const selected = cursor === i;
    const catType = i === 0 ? 'hank' : 'bailey';
    const cfg = CAT_CONFIG[catType];

    // Box background
    if (selected) {
      ctx.shadowColor = COLORS.mint;
      ctx.shadowBlur = 15;
    }
    ctx.fillStyle = selected ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.5)';
    roundRect(bx, by, boxW, boxH, 12);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = selected ? COLORS.mint : 'rgba(0,0,0,0.15)';
    ctx.lineWidth = selected ? 3 : 1;
    roundRect(bx, by, boxW, boxH, 12);
    ctx.stroke();

    // Cat preview
    const previewCat = {
      type: catType, x: bx + boxW / 2 - cfg.width / 2, y: by + 30 + (boxH - 100) / 2 - cfg.height / 2,
      onGround: true, ducking: false, stunTimer: 0, facingLeft: false,
      invincible: false, wallStaring: false, wallStareShowBubble: false
    };
    drawCatDetailed(previewCat, time);

    // Name
    ctx.textAlign = 'center';
    ctx.font = '700 24px Nunito, sans-serif';
    ctx.fillStyle = COLORS.text;
    ctx.fillText(cfg.name, bx + boxW / 2, by + 28);

    // Description
    ctx.font = '13px "Patrick Hand", cursive';
    ctx.fillStyle = COLORS.textLight;
    ctx.fillText(cfg.desc, bx + boxW / 2, by + boxH - 12);
  }

  // Instructions
  ctx.font = '18px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.text;
  ctx.textAlign = 'center';
  const instrY = 55 + boxH + 18;
  ctx.fillText('\u2190 \u2192 to choose    Space to play', LOGICAL_W / 2, instrY);

  drawMuteButton();
}

function drawHUD() {
  ctx.textAlign = 'left';
  ctx.font = '28px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.text;
  ctx.fillText(gameState.score.toString(), 15, 30);

  ctx.textAlign = 'right';
  ctx.font = '14px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.textLight;
  ctx.fillText('Best: ' + gameState.highScore, LOGICAL_W - 50, 28);

  // Lives
  ctx.textAlign = 'left';
  for (let i = 0; i < 3; i++) {
    const lx = 15 + i * 22, ly = LOGICAL_H - 25;
    ctx.fillStyle = i < gameState.lives ? COLORS.mint : 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(lx + 6, ly + 5, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lx + 2, ly - 1, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lx + 6, ly - 2, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lx + 10, ly - 1, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // Cat indicator
  const indX = 15, indY = 42;
  ctx.fillStyle = playerCat.type === 'hank' ? COLORS.orange : COLORS.black;
  ctx.shadowColor = COLORS.mint; ctx.shadowBlur = 8;
  roundRect(indX, indY, 20, 16, 4); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = COLORS.white;
  ctx.beginPath(); ctx.arc(indX + 7, indY + 7, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(indX + 13, indY + 7, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = COLORS.text;
  ctx.font = '12px "Patrick Hand", cursive';
  ctx.fillText(CAT_CONFIG[playerCat.type].name, indX + 24, indY + 13);

  if (gameState.speedBoostTimer > 0) {
    ctx.fillStyle = COLORS.mint;
    ctx.font = '14px "Patrick Hand", cursive';
    ctx.textAlign = 'center';
    ctx.fillText('ZOOM!', LOGICAL_W / 2, 20);
    ctx.textAlign = 'left';
  }

  drawMuteButton();
}

function drawMuteButton() {
  ctx.textAlign = 'center';
  ctx.font = '20px sans-serif';
  ctx.fillStyle = COLORS.text;
  ctx.fillText(audio.muted ? '\u{1F507}' : '\u{1F50A}', LOGICAL_W - 22, 24);
}

function drawGameOverScreen(time) {
  bg.draw(time);
  ctx.fillStyle = 'rgba(74, 55, 40, 0.5)';
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

  ctx.textAlign = 'center';
  ctx.font = '900 42px Nunito, sans-serif';
  ctx.fillStyle = COLORS.white;
  ctx.fillText('ZOOMIES OVER', LOGICAL_W / 2, 70);

  // Tired cat (the one you played as, ducking/loafing)
  const tiredCat = {
    type: gameState.selectedCat,
    x: LOGICAL_W / 2 - CAT_CONFIG[gameState.selectedCat].width / 2,
    y: GROUND_Y - CAT_CONFIG[gameState.selectedCat].duckHeight,
    onGround: true, ducking: true, stunTimer: 0, facingLeft: false,
    invincible: false, wallStaring: false, wallStareShowBubble: false
  };
  drawCatDetailed(tiredCat, time);

  ctx.font = '26px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.white;
  ctx.fillText('Score: ' + gameState.score, LOGICAL_W / 2, 120);

  ctx.font = '20px "Patrick Hand", cursive';
  if (gameState.newHighScore) {
    ctx.fillStyle = COLORS.mint;
    ctx.fillText('NEW HIGH SCORE!', LOGICAL_W / 2, 148);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Best: ' + gameState.highScore, LOGICAL_W / 2, 148);
  }

  const pulse = 0.5 + Math.sin(time * 3) * 0.5;
  ctx.globalAlpha = pulse;
  ctx.font = '22px "Patrick Hand", cursive';
  ctx.fillStyle = COLORS.white;
  ctx.fillText('[ Again? ]', LOGICAL_W / 2, 180);
  ctx.globalAlpha = 1;
  drawMuteButton();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  gameState.time += dt;
  const time = gameState.time;

  if (input.consumeMuteClick()) { audio.init(); audio.toggleMute(); }

  ctx.save();
  if (gameState.screenShake > 0) {
    gameState.screenShake -= dt;
    ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
  }

  switch (gameState.screen) {
    case 'title':
      bg.update(dt, 60);
      drawTitleScreen(time);
      if (input.consumeJump() || input.consumeAnyKey()) {
        audio.init();
        gameState.screen = 'select';
      }
      break;

    case 'select':
      bg.update(dt, 40);
      drawSelectScreen(time);
      if (input.consumeLeft()) gameState.selectCursor = 0;
      if (input.consumeRight()) gameState.selectCursor = 1;
      if (input.consumeJump()) {
        gameState.selectedCat = gameState.selectCursor === 0 ? 'hank' : 'bailey';
        resetGame();
        gameState.screen = 'playing';
        audio.startMusic();
      }
      break;

    case 'playing':
      updateGame(dt, time);
      drawGame(time);
      break;

    case 'gameover':
      drawGameOverScreen(time);
      if (input.consumeJump() || input.consumeAnyKey()) {
        gameState.screen = 'select';
      }
      break;
  }

  ctx.restore();
}

function updateGame(dt, time) {
  gameState.difficulty += dt * 0.02;
  gameState.gameSpeed = 200 + gameState.difficulty * 80;

  let effectiveSpeed = gameState.gameSpeed;
  if (gameState.speedBoostTimer > 0) {
    gameState.speedBoostTimer -= dt;
    effectiveSpeed *= 1.4;
  }

  gameState.score += Math.floor(dt * effectiveSpeed * 0.05);

  if (input.consumeJump()) playerCat.jump();
  playerCat.duck(input.isDucking());

  playerCat.update(dt);
  bg.update(dt, effectiveSpeed);

  obstacleTimer -= dt;
  if (obstacleTimer <= 0) {
    spawnObstacle();
    obstacleTimer = Math.max(0.8, 2.5 - gameState.difficulty * 0.15) + Math.random() * 1.0;
  }

  collectibleTimer -= dt;
  if (collectibleTimer <= 0) {
    spawnCollectible();
    collectibleTimer = 2 + Math.random() * 3;
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].update(dt, effectiveSpeed);
    if (obstacles[i].x < -80) obstacles.splice(i, 1);
  }

  for (let i = collectibles.length - 1; i >= 0; i--) {
    collectibles[i].update(dt, effectiveSpeed);
    if (collectibles[i].x < -40) collectibles.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  handleCollisions();
  handleCollectibles();
}

function drawGame(time) {
  bg.draw(time);
  collectibles.forEach(c => drawCollectible(c, time));
  obstacles.forEach(o => drawObstacle(o, time));
  drawCatDetailed(playerCat, time);
  particles.forEach(p => p.draw());
  drawHUD();
}

// ============================================================
// INIT
// ============================================================
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
